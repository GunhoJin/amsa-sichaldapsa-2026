<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>중고등부 여름캠프 · 개인별 역할 카드</title>
<style>
  :root{
    --paper:#ffffff; --bg:#f7f1ea;
    --ink:#2b1f16; --muted:#7a6a5a; --faint:#a4917d;
    --line:#e6d9c8; --line-soft:#f0e6d9;
    --accent:#b5651d; --accent-ink:#8a4c15; --accent-soft:#f6e6d4;
    --hi-bg:#fbeedd; --hi-bar:#b5651d;
    --band:#b5651d;
    --shadow:0 1px 2px rgba(60,40,20,.06),0 6px 20px rgba(60,40,20,.06);
  }
  @media (prefers-color-scheme:dark){
    :root{
      --paper:#221a12; --bg:#17110b;
      --ink:#f2e9de; --muted:#c2ac93; --faint:#8a7560;
      --line:#3c2f22; --line-soft:#2c2318;
      --accent:#e0954a; --accent-ink:#f3c48e; --accent-soft:#3a2a17;
      --hi-bg:#3a2a15; --hi-bar:#e0954a;
      --band:#3a2a15;
      --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.35);
    }
  }
  :root[data-theme="light"]{
    --paper:#ffffff; --bg:#f7f1ea; --ink:#2b1f16; --muted:#7a6a5a; --faint:#a4917d;
    --line:#e6d9c8; --line-soft:#f0e6d9; --accent:#b5651d; --accent-ink:#8a4c15;
    --accent-soft:#f6e6d4; --hi-bg:#fbeedd; --hi-bar:#b5651d; --band:#b5651d;
    --shadow:0 1px 2px rgba(60,40,20,.06),0 6px 20px rgba(60,40,20,.06);
  }
  :root[data-theme="dark"]{
    --paper:#221a12; --bg:#17110b; --ink:#f2e9de; --muted:#c2ac93; --faint:#8a7560;
    --line:#3c2f22; --line-soft:#2c2318; --accent:#e0954a; --accent-ink:#f3c48e;
    --accent-soft:#3a2a17; --hi-bg:#3a2a15; --hi-bar:#e0954a; --band:#3a2a15;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.35);
  }

  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:"Pretendard",-apple-system,"Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",system-ui,sans-serif;
    font-feature-settings:"tnum";
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
  }

  .bar{
    position:sticky; top:0; z-index:10;
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    padding:14px 22px; background:var(--paper); border-bottom:1px solid var(--line);
  }
  .bar h1{font-size:15px; margin:0; font-weight:700; letter-spacing:-.01em}
  .bar .sub{font-size:12.5px; color:var(--muted)}
  .bar .spacer{flex:1}
  .btn{
    font:inherit; font-size:13px; font-weight:600; cursor:pointer;
    color:#fff; background:var(--accent); border:none; border-radius:8px;
    padding:8px 15px;
  }
  .btn:focus-visible{outline:2px solid var(--accent-ink); outline-offset:2px}
  .legend{display:flex; align-items:center; gap:7px; font-size:12px; color:var(--muted)}
  .swatch{width:26px; height:14px; border-radius:3px; background:var(--hi-bg); border-left:3px solid var(--hi-bar)}

  .sheet{max-width:900px; margin:0 auto; padding:26px 18px 60px}

  .card{
    background:var(--paper); border:1px solid var(--line); border-radius:14px;
    box-shadow:var(--shadow); overflow:hidden; margin:0 0 22px;
    break-inside:avoid;
  }
  .head{
    display:flex; align-items:baseline; gap:12px; flex-wrap:wrap;
    padding:16px 20px 14px; border-bottom:1px solid var(--line-soft);
    border-top:4px solid var(--band);
  }
  .name{font-size:22px; font-weight:800; letter-spacing:-.02em; margin:0}
  .head .role{font-size:13.5px; color:var(--muted); font-weight:600}
  .badges{display:flex; gap:6px; margin-left:auto; flex-wrap:wrap}
  .badge{
    font-size:11px; font-weight:700; letter-spacing:.02em;
    padding:4px 9px; border-radius:999px;
    background:var(--accent-soft); color:var(--accent-ink);
  }
  .badge.alt{background:transparent; color:var(--muted); border:1px solid var(--line)}
  .prep{
    padding:10px 20px; font-size:12.5px; color:var(--muted);
    background:var(--accent-soft); border-bottom:1px solid var(--line-soft);
  }
  .prep b{color:var(--accent-ink)}

  table{width:100%; border-collapse:collapse; font-size:12.5px}
  th,td{text-align:left; padding:7px 12px; vertical-align:top; border-bottom:1px solid var(--line-soft)}
  thead th{
    font-size:10.5px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--faint); font-weight:700; background:transparent;
  }
  td.t{white-space:nowrap; font-variant-numeric:tabular-nums; color:var(--muted); width:112px}
  td.p{color:var(--muted); width:150px}
  td.r{color:var(--ink)}
  tr.hi td{background:var(--hi-bg)}
  tr.hi td.t{border-left:3px solid var(--hi-bar); padding-left:9px}
  tr.hi td.r{font-weight:700; color:var(--accent-ink)}
  td.dash{color:var(--faint)}

  .compact{padding:6px 20px 14px}
  .compact .row{display:flex; gap:14px; padding:8px 0; border-bottom:1px solid var(--line-soft)}
  .compact .row:last-child{border-bottom:none}
  .compact .ct{white-space:nowrap; font-variant-numeric:tabular-nums; color:var(--muted); width:112px; font-size:12.5px}
  .compact .cr{font-size:13px; font-weight:600; color:var(--accent-ink)}
  .compact .note{font-weight:400; color:var(--muted)}

  .foot{max-width:900px; margin:10px auto 0; padding:0 20px; color:var(--faint); font-size:11.5px}

  @media print{
    :root{--bg:#fff}
    body{background:#fff}
    .bar,.foot{display:none}
    .sheet{max-width:none; margin:0; padding:0}
    .card{
      box-shadow:none; border:1px solid #d8c7ae; border-radius:10px;
      margin:0 0 14px; page-break-inside:avoid;
    }
    @page{size:A4 portrait; margin:14mm}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="bar">

  </div>
  <div class="spacer"></div>
  <div class="legend"><span class="swatch"></span> 강조 = 내 담당</div>
  <button class="btn" onclick="window.print()">인쇄 / PDF 저장</button>
</div>

<div class="sheet" id="sheet"></div>
<div class="foot">각 선생님은 본인 카드만 인쇄해 지참하세요. 원본: 워크북 · 프로그램 큐시트(노션). 전체 흐름 위에 본인 담당을 강조 표시했습니다. 조보영 카타리나T·김채현 마리스텔라T는 R&amp;R 세부 역할이 아직 배정되지 않아 확인 필요로 표시했습니다.</div>

function esc(s){return s.replace(/&(?!\w+;|#)/g,"&amp;")}
function fullTable(p){
  let rows = p.duties.map((d,i)=>{
    const s=SLOTS[i];
    const rcell = d.t ? `<td class="r">${d.t}</td>` : `<td class="r dash">—</td>`;
    return `<tr class="${d.hi?'hi':''}"><td class="t">${s[0]}</td><td class="p">${s[1]}</td>${rcell}</tr>`;
  }).join("");
  return `<table><thead><tr><th>시간</th><th>전체 프로그램</th><th>내 역할</th></tr></thead><tbody>${rows}</tbody></table>`;
}
function compactList(p){
  const rows=p.compact.map(c=>`<div class="row"><div class="ct">${c[0]}</div><div class="cr ${c[2]?'':'note'}">${c[1]}</div></div>`).join("");
  return `<div class="compact">${rows}</div>`;
}
function card(p){
  const badges=p.badges.map((b,i)=>`<span class="badge ${i>0?'alt':''}">${b}</span>`).join("");
  const body=p.duties?fullTable(p):compactList(p);
  const prep=p.prep?`<div class="prep">${p.prep}</div>`:"";
  return `<section class="card">
    <div class="head"><h2 class="name">${p.name}</h2><span class="role">${p.role}</span><span class="badges">${badges}</span></div>
    ${prep}${body}
  </section>`;
}
document.getElementById("sheet").innerHTML = PEOPLE.map(card).join("");

</html>
